<!DOCTYPE html>
<html>
<head>
    <title>Mid Marks Analysis</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2>Upload Excel File</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">

        <input type="file" name="file" class="form-control mb-3" required>

        <input type="number" name="threshold" class="form-control mb-3"
        placeholder="Enter threshold (e.g. 12)" required>

        <select name="condition" class="form-control mb-3">
            <option value="<">Less than</option>
            <option value=">">Greater than</option>
            <option value="=">Equal to</option>
        </select>

        <button class="btn btn-primary w-100">Analyze</button>

    </form>
    {% if table %}
    <div class="mt-4">
        {{ table | safe }}
    </div>
{% endif %}

    {% if show_download %}
        <a href="/download" class="btn btn-success mt-3">
            Download Excel
        </a>
    {% endif %}

</div>

</body>
</html>
